name: Build Android APKs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      - name: Prepare Xray binaries for Android assets
        working-directory: mobile
        run: npm run android:prepare-xray

      - name: Build debug APK
        working-directory: mobile/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: mobile/android
        run: chmod +x ./gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: horizon-tunnel-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: horizon-tunnel-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
