<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xray Personal Client</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Segoe UI, sans-serif;
        background: #eef3f9;
        color: #1f2937;
      }

      #root {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px;
      }

      .panel {
        background: white;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0 16px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .dot.online {
        background: #1f9d55;
      }

      .dot.offline {
        background: #d64545;
      }

      .button-row {
        display: flex;
        gap: 8px;
        margin: 0 0 16px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: #2a68ff;
        color: white;
      }

      button.danger {
        background: #c13d3d;
        color: white;
      }

      button.secondary {
        background: #dbe4f3;
        color: #243447;
      }

      textarea {
        width: 100%;
        min-height: 380px;
        border: 1px solid #c5d2e5;
        border-radius: 10px;
        padding: 12px;
        font-family: Consolas, monospace;
        font-size: 13px;
      }

      .hint {
        font-size: 13px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./renderer.js"></script>
  </body>
</html>
